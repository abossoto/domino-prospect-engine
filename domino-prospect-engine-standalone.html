const RESEARCH_SYSTEM = `Sei un analista di intelligence commerciale senior per Domino, agenzia CX italiana.
Produci dossier completi su aziende prospect usando ESCLUSIVAMENTE dati reali trovati sul web.

REGOLA FONDAMENTALE — NON INVENTARE MAI:
Se una fonte non dà risultati concreti, scrivi esplicitamente "⚠️ Non trovato" per quella sezione.
Non generalizzare. Non assumere. Non riempire lacune con supposizioni.
Un dato mancante segnalato è più utile di un dato inventato.
Se i dati trovati sono scarsi, segnala la scarsezza esplicitamente nell'ultima sezione del report.

FONTI DA CERCARE IN ORDINE:

1. SITO WEB AZIENDALE
   - Leggi homepage + chi siamo + prodotti/servizi + eventuali case study
   - Estrai: mission, prodotti/servizi chiave, mercati, clienti nominati, valori comunicati
   - Valuta qualità: design, CTA, lead generation, blog, newsletter, area riservata

2. DATI FINANZIARI ITALIANI
   - Query da provare: "[azienda] fatturato bilancio dipendenti", "[azienda] site:cerved.com",
     "[azienda] Registro Imprese CCIAA", "[azienda] annual report risultati finanziari"
   - Estrai: forma giuridica, anno fondazione, fatturato ultimo anno, dipendenti, ATECO, rating
   - Se non trovi nulla: "⚠️ Dati finanziari non trovati pubblicamente"

3. NEWS E COMUNICATI (ultimi 12 mesi)
   - Query: "[azienda] news 2024 2025", "[azienda] comunicato stampa", "[azienda] acquisizione partnership"
   - Estrai eventi con date precise. Se nulla: "⚠️ Nessuna news rilevante trovata"

4. LINKEDIN
   - Cerca profilo aziendale: dimensione, crescita
   - Cerca persone chiave: CEO, CMO, CDO, Direttore Marketing/Commerciale/Digital
   - Per ogni persona: nome completo, ruolo, anzianità in azienda
   - Se profili non accessibili: "⚠️ Profili LinkedIn non accessibili pubblicamente"

5. JOB POSTING ATTIVI
   - Query: "[azienda] lavora con noi offerte lavoro", "[azienda] site:linkedin.com/jobs"
   - Interpreta cosa rivelano strategicamente (es. assumono CDO = digital transformation in corso)
   - Se nulla: "⚠️ Nessun job posting trovato"

6. PRESENZA DIGITALE E SOCIAL
   - Valuta sito, social attivi, frequenza post, blog, newsletter
   - Rating maturità: Bassa / Media / Alta con motivazione basata su dati osservati

STRUTTURA OBBLIGATORIA DEL REPORT — usa esattamente questi titoli:

## PROFILO AZIENDA
Settore, forma giuridica, anno fondazione, sede, fatturato, dipendenti, mercati, prodotti/servizi chiave.

## DATI FINANZIARI
Fatturato, trend, dipendenti, rating. O: ⚠️ Non trovato con motivazione.

## PERSONE CHIAVE
Nome | Ruolo | Anzianità | Note rilevanti. O: ⚠️ Non trovato.

## SEGNALI RECENTI
Elenco cronologico con date. O: ⚠️ Nessun segnale trovato.

## JOB POSTING E PRIORITÀ STRATEGICHE
Posizioni aperte + interpretazione strategica. O: ⚠️ Nessun job posting trovato.

## PRESENZA E MATURITÀ DIGITALE
Valutazione concreta di sito, social, contenuti. Rating: Bassa/Media/Alta con motivazione.

## SFIDE PROBABILI
3-5 sfide concrete dedotte dai dati raccolti. Zero generalizzazioni.

## OPPORTUNITÀ PER DOMINO
Dove portare valore, quale servizio, perché ora.

## ⚠️ DATI NON TROVATI
Elenco obbligatorio di tutto ciò che non è stato trovato nonostante le ricerche.

// ─── API ────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function callClaude({ apiKey, system, messages, tools, max_tokens = 5000 }) {
  const body = { model: "claude-sonnet-4-20250514", max_tokens, system, messages };
  if (tools) body.tools = tools;
  for (let attempt = 0; attempt <= 4; attempt++) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01" },
      body: JSON.stringify(body),
    });
    if (res.status === 429) {
      if (attempt >= 4) throw new Error("Rate limit raggiunto. Riprova tra qualche minuto o ricarica crediti su console.anthropic.com.");
      const w = parseInt(res.headers.get("retry-after") || "20", 10);
      await sleep((w + 3) * 1000);
      continue;
    }
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || "Errore API "+res.status); }
    return res.json();
  }
}

function extractText(data) {
  return (data?.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

async function runResearchAgent({ apiKey, prospect, note, onProgress }) {
  const webSearchTool = { type: "web_search_20250305", name: "web_search" };
  const userMsg = "Produci un dossier completo su questo prospect per il team commerciale di Domino.\n\nPROSPECT: \"" + prospect + "\"\n" + (note ? "NOTE: " + note + "\n" : "") + "\nCerca: sito web, dati finanziari (Cerved, bilanci), news ultimi 12 mesi, LinkedIn con nomi C-level, job posting, presenza digitale.\nFai almeno 10 ricerche. Se una fonte non dà risultati, scrivi ⚠️ Non trovato.\nSezioni: PROFILO | DATI FINANZIARI | PERSONE CHIAVE | SEGNALI RECENTI | JOB POSTING | PRESENZA DIGITALE | SFIDE PROBABILI | OPPORTUNITÀ PER DOMINO | ⚠️ DATI NON TROVATI";
  let messages = [{ role: "user", content: userMsg }];
  let data = await callClaude({ apiKey, system: RESEARCH_SYSTEM, messages, tools: [webSearchTool], max_tokens: 6000 });
  let i = 0;
  while (data.stop_reason === "tool_use" && i < 20) {
    i++; onProgress && onProgress(i);
    const tb = data.content.filter(b => b.type === "tool_use");
    if (!tb.length) break;
    messages = [...messages, { role: "assistant", content: data.content }];
    const fb = i < 7 ? "Continua: dati finanziari, LinkedIn manager, job posting." : i < 14 ? "Approfondisci presenza digitale. ⚠️ Non trovato dove mancano dati." : "Produci il report finale con ⚠️ DATI NON TROVATI.";
    messages = [...messages, { role: "user", content: tb.map(b => ({ type: "tool_result", tool_use_id: b.id, content: fb })) }];
    await sleep(2000);
    data = await callClaude({ apiKey, system: RESEARCH_SYSTEM, messages, tools: [webSearchTool], max_tokens: 6000 });
  }
  return extractText(data);
}

function parseJSON(raw) {
  let s = raw.trim().replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/\s*```$/i,"").trim();
  const a = s.indexOf("{"), z = s.lastIndexOf("}");
  if (a===-1||z===-1) throw new Error("Risposta non in formato JSON");
  return JSON.parse(s.slice(a, z+1));
}

function exportPPT(result) {

  const RED = "E8272A", BLACK = "111111", WHITE = "FFFFFF", LGRAY = "F5F5F5";

    // Body

    // Footer
    slide.addText("domino — Strategic CX Partner", { x:0, y:5.35, w:10, h:0.28, align:"center", fontSize:8, color:"9CA3AF" });
  };

  const d = result.deck || {};
  const p = result.prospect || {};

  // Cover slide
  const cover = pptx.addSlide();
  cover.background = { color: BLACK };
  cover.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.15, h:5.625, fill:{ color: RED } });
  cover.addText("domino", { x:0.4, y:1.8, w:9, h:0.8, fontSize:36, bold:true, color:RED });
  cover.addText("Prospect Engine — " + (p.nome||""), { x:0.4, y:2.7, w:9, h:0.5, fontSize:16, color:WHITE });
  cover.addText("Strategic CX Partner dal 1996", { x:0.4, y:3.4, w:9, h:0.4, fontSize:11, color:"9CA3AF" });

  // 5 content slides
  for (let n = 1; n <= 5; n++) {
    addSlide(d["slide_"+n+"_titolo"], d["slide_"+n+"_contenuto"], n);
  }

  // Intelligence slide
  const intel = pptx.addSlide();
  intel.background = { color: LGRAY };
  intel.addShape(pptx.ShapeType.rect, { x:0, y:0, w:10, h:0.12, fill:{ color: RED } });
  intel.addText("Scheda Intelligence", { x:0.35, y:0.2, w:9.3, h:0.55, fontSize:16, bold:true, color:BLACK });
  const rows = [
    [p.settore||"—", p.dimensione||"—", p.mercati||"—"],
    [p.fatturato_stimato||"N/D", p.decisore_target||"—", p.maturita_digitale||"—"],
  ];
  const labels = ["Settore","Dimensione","Mercati","Fatturato","Decisore","Maturità digitale"];
  rows.forEach((row, ri) => {
    row.forEach((val, ci) => {
      const x = 0.2 + ci * 3.26, y = 0.9 + ri * 1.5;
      intel.addShape(pptx.ShapeType.rect, { x, y, w:3.1, h:1.3, fill:{ color:WHITE }, line:{ color:"E5E7EB", width:1 } });
      intel.addText(labels[ri*3+ci], { x, y:y+0.05, w:3.1, h:0.3, align:"center", fontSize:8, color:"9CA3AF", bold:true });
      intel.addText(val, { x, y:y+0.35, w:3.1, h:0.8, align:"center", valign:"middle", fontSize:10, color:BLACK, bold:true, wrap:true });

  intel.addText("Hook: " + (p.hook||""), { x:0.35, y:3.2, w:9.3, h:0.7, fontSize:10, color:WHITE, fill:{ color: RED }, inset:0.1, valign:"middle", wrap:true });

  const cs = p.casi_studio || [];

    intel.addText("Case study consigliati: " + cs.join(" · "), { x:0.35, y:4.1, w:9.3, h:0.9, fontSize:9, color:"374151", wrap:true });

}

const ARCHIVE_KEY = "domino_pe_archive";
function loadArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]"); } catch { return []; }
}
function saveToArchive(result, prospect) {
  const archive = loadArchive();
  archive.unshift({ id: Date.now(), date: new Date().toLocaleDateString("it-IT"), prospect, nome: result.prospect?.nome, settore: result.prospect?.settore, result });
  if (archive.length > 50) archive.splice(50);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));
}

async function syncHubSpot(result, hsToken) {
  const p = result.prospect || {};
  const companyName = p.nome || "Prospect Domino";
  
  // Search existing company
  const searchRes = await fetch("https://api.hubapi.com/crm/v3/objects/companies/search", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + hsToken },
    body: JSON.stringify({ filterGroups: [{ filters: [{ propertyName:"name", operator:"EQ", value: companyName }] }], limit:1 })
  });
  const searchData = await searchRes.json();
  const existing = searchData.results?.[0];

  const props = {
    name: companyName,
    industry: p.settore || "",
    annualrevenue: p.fatturato_stimato || "",
    numberofemployees: p.dimensione || "",
    description: "Analisi Domino PE — " + new Date().toLocaleDateString("it-IT") + "\nHook: " + (p.hook||"") + "\nDecisore: " + (p.decisore_target||"") + "\nMaturità digitale: " + (p.maturita_digitale||""),
    hs_lead_status: "IN_PROGRESS"
  };

  let companyId;
  if (existing) {
    await fetch("https://api.hubapi.com/crm/v3/objects/companies/" + existing.id, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + hsToken },
      body: JSON.stringify({ properties: props })
    });
    companyId = existing.id;
  } else {
    const createRes = await fetch("https://api.hubapi.com/crm/v3/objects/companies", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + hsToken },
      body: JSON.stringify({ properties: props })
    });
    const created = await createRes.json();
    companyId = created.id;
  }

  // Add note with full analysis
  const noteBody = "📊 ANALISI DOMINO PROSPECT ENGINE\n\n" +
    "Settore: " + (p.settore||"—") + "\n" +
    "Dimensione: " + (p.dimensione||"—") + "\n" +
    "Fatturato: " + (p.fatturato_stimato||"N/D") + "\n" +
    "Mercati: " + (p.mercati||"—") + "\n" +
    "Maturità digitale: " + (p.maturita_digitale||"—") + "\n\n" +
    "DECISORE TARGET: " + (p.decisore_target||"—") + "\n" +
    "HOOK: " + (p.hook||"—") + "\n\n" +
    "SFIDE PROBABILI:\n" + (p.sfide_probabili||[]).map(s=>"• "+s).join("\n") + "\n\n" +
    "SEGNALI RECENTI:\n" + (p.segnali_recenti||[]).map(s=>"• "+s).join("\n") + "\n\n" +
    "CASE STUDY CONSIGLIATI:\n" + (p.casi_studio||[]).map((s,i)=>["Stesso settore","Sfida simile","Metodologia"][i]+": "+s).join("\n") + "\n\n" +
    "WORKFLOW CONTATTO:\n" + (result.workflow||[]).map(s=>"Giorno "+s.giorno+" ["+s.canale+"]: "+s.azione).join("\n");

  await fetch("https://api.hubapi.com/crm/v3/objects/notes", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + hsToken },
    body: JSON.stringify({ properties: {
      hs_note_body: noteBody,
      hs_timestamp: Date.now().toString()
    }, associations: [{ to: { id: companyId }, types: [{ associationCategory:"HUBSPOT_DEFINED", associationTypeId:190 }] }] })
  });

  return { companyId, isNew: !existing };
}

      {[0,1,2].map(i=><div key={i} style={{ width:"10px", height:"10px", background:"#E8272A", borderRadius:"50%", animation:"bounce 1s ease-in-out "+(i*0.18)+"s infinite" }} />)}
    </div>
    <div style={{ maxWidth:"340px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"12px" }}>
      {steps.map((s,i)=>{
        const done=searchCount>s.t+1, active=!done&&searchCount>=s.t;
        return <div key={i} style={{ display:"flex", alignItems:"center", gap:"10px", opacity:done||active?1:0.35 }}>
          <StatusDot done={done} active={active} />
          <span style={{ fontSize:"13px", color:done?"#16a34a":active?"#E8272A":"#6b7280", fontWeight:active||done?"600":"400" }}>{s.label}</span>
        </div>;
      })}
      <div style={{ display:"flex", alignItems:"center", gap:"10px", opacity:searchCount>=15?1:0.35, marginTop:"4px", paddingTop:"12px", borderTop:"1px solid #f3f4f6" }}>

      </div>
    </div>
    <p style={{ color:"#9ca3af", margin:"20px 0 0", textAlign:"center", fontSize:"12px" }}>{searchCount} ricerche completate · ~3-4 minuti</p>
  </div>;
}

    if (!key.trim().startsWith("sk-ant-")) { setErr("La chiave deve iniziare con sk-ant-"); return; }

  return <div style={{ minHeight:"100vh", background:"#f7f7f7", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>

        <div style={{ fontSize:"32px", marginBottom:"12px" }}>🔑</div>

      </div>
      <input value={key} onChange={e=>{setKey(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&save()} type="password" placeholder="sk-ant-api03-..." style={{ width:"100%", padding:"12px 14px", border:"2px solid "+(err?"#fca5a5":"#e5e7eb"), borderRadius:"9px", fontSize:"14px", outline:"none", fontFamily:"monospace", boxSizing:"border-box", marginBottom:err?"4px":"16px" }} onFocus={e=>e.target.style.borderColor="#E8272A"} onBlur={e=>e.target.style.borderColor=err?"#fca5a5":"#e5e7eb"} />
      {err && <p style={{ color:"#dc2626", fontSize:"12px", marginBottom:"12px" }}>{err}</p>}
      <button onClick={save} disabled={!key.trim()} style={{ width:"100%", padding:"13px", background:key.trim()?"#E8272A":"#e5e7eb", color:key.trim()?"white":"#9ca3af", border:"none", borderRadius:"9px", fontSize:"15px", fontWeight:"700", cursor:key.trim()?"pointer":"not-allowed", fontFamily:"inherit" }}>Inizia →</button>

        <b>Come ottenerla:</b> <a href="https://console.anthropic.com" target="_blank" style={{ color:"#E8272A" }}>console.anthropic.com</a> → API Keys → Create Key
      </div>
    </div>
  </div>;
}

function App() {
  const [apiKey,   setApiKey]   = useState(()=>localStorage.getItem("domino_api_key")||"");
  const [hsToken,  setHsToken]  = useState(()=>localStorage.getItem("domino_hs_token")||"");

  const [searchCount, setSearchCount] = useState(0);
  const [result,   setResult]   = useState(null);
  const [error,    setError]    = useState("");
  const [tab,      setTab]      = useState("intel");
  const [showArchive, setShowArchive] = useState(false);
  const [showHsModal, setShowHsModal] = useState(false);
  const [hsStatus,    setHsStatus]    = useState(null); // null | "saving" | "ok" | "error"
  const [hsTempToken, setHsTempToken] = useState("");

  const EXAMPLES = ["Technogym","Gruppo Humanitas","Alpitour","Generali Assicurazioni","Danieli Group"];

  if (!apiKey) return <ApiKeySetup onSave={setApiKey} />;
  if (showArchive) return <ArchiveView onSelect={r=>{setResult(r);setShowArchive(false);setTab("intel");}} onClose={()=>setShowArchive(false)} />;

  const analyze = async () => {
    if (!input.trim() || loading) return;
    setLoading(true); setError(""); setResult(null); setSearchCount(0);
    try {
      const report = await runResearchAgent({ apiKey, prospect:input.trim(), note:note.trim(), onProgress:n=>setSearchCount(n) });
      setSearchCount(15);
      const genData = await callClaude({ apiKey, system:GENERATION_SYSTEM, messages:[{role:"user",content:"Report di intelligence:\n\n"+report+"\n\nGenera i materiali sales. Restituisci solo il JSON."}], max_tokens:3000 });
      const parsed = parseJSON(extractText(genData));
      parsed._research_report = report;
      parsed._input = input.trim();
      setResult(parsed);
      setTab("intel");
      saveToArchive(parsed, input.trim());
    } catch(err) { setError(err.message||"Errore sconosciuto"); }
    finally { setLoading(false); }
  };

  const handleHsSync = async () => {
    if (!hsToken) { setShowHsModal(true); return; }
    setHsStatus("saving");

              <div style={{ background:"#f3f4f6", padding:"11px 16px", borderBottom:"1px solid #e5e7eb", display:"flex", gap:"8px", alignItems:"center" }}>
                <span style={{ fontSize:"11px", color:"#6b7280", fontWeight:"700" }}>OGGETTO:</span>
                <span style={{ fontSize:"14px", color:"#111", fontWeight:"700" }}>{result.mail?.oggetto}</span>
              </div>
              <div style={{ padding:"18px 16px", fontSize:"14px", color:"#374151", lineHeight:"1.7", whiteSpace:"pre-wrap" }}>{result.mail?.corpo}</div>
            </div>
          </div>}

          {/* DECK */}
          {tab==="deck" && <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"18px" }}>
              <h2 style={{ margin:0, fontSize:"17px", fontWeight:"700", color:"#111" }}>Struttura deck — 5 slide</h2>
              <button onClick={()=>exportPPT(result)} style={{ background:"#E8272A", color:"white", border:"none", padding:"7px 14px", borderRadius:"7px", cursor:"pointer", fontSize:"12px", fontWeight:"700", fontFamily:"inherit" }}>⬇ Esporta PPT</button>
            </div>
            {[1,2,3,4,5].map(n=><SlideCard key={n} n={n} titolo={result.deck?.["slide_"+n+"_titolo"]} contenuto={result.deck?.["slide_"+n+"_contenuto"]} />)}
          </div>}

          {/* WORKFLOW */}
          {tab==="workflow" && <div>
            <h2 style={{ margin:"0 0 22px", fontSize:"17px", fontWeight:"700", color:"#111" }}>Workflow primo contatto</h2>
            {result.workflow?.map((step,i)=><WorkflowStep key={i} step={step} last={i===result.workflow.length-1} />)}
          </div>}

          {/* LINKEDIN */}
          {tab==="linkedin" && <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"18px" }}>
              <h2 style={{ margin:0, fontSize:"17px", fontWeight:"700", color:"#111" }}>Messaggio LinkedIn</h2>
              <CopyBtn text={result.linkedin_connection} />
            </div>
            <div style={{ background:"#f0f8ff", border:"1px solid #bfdbfe", borderRadius:"11px", padding:"18px", marginBottom:"14px" }}>
              <div style={{ display:"flex", gap:"12px" }}>
                <div style={{ width:"38px", height:"38px", background:"#0077B5", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", color:"white", fontWeight:"800", fontSize:"15px", flexShrink:0 }}>D</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:"700", fontSize:"13px", color:"#111", marginBottom:"1px" }}>Domino — Account</div>
                  <div style={{ fontSize:"11px", color:"#6b7280", marginBottom:"10px" }}>Richiesta di collegamento</div>
                  <div style={{ fontSize:"14px", color:"#374151", lineHeight:"1.6", background:"white", padding:"11px", borderRadius:"7px" }}>{result.linkedin_connection}</div>
                  <div style={{ fontSize:"11px", color:(result.linkedin_connection?.length||0)>200?"#dc2626":"#6b7280", marginTop:"6px" }}>{result.linkedin_connection?.length||0} / 200 caratteri</div>
                </div>
              </div>
            </div>
          </div>}

          {/* FONTI */}
          {tab==="fonti" && <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"18px" }}>
              <h2 style={{ margin:0, fontSize:"17px", fontWeight:"700", color:"#111" }}>Report di ricerca</h2>
              <CopyBtn text={result._research_report||""} />
            </div>
            <div style={{ background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:"10px", padding:"16px 18px", fontSize:"13px", color:"#374151", lineHeight:"1.7", whiteSpace:"pre-wrap", maxHeight:"520px", overflowY:"auto" }}>{result._research_report||"Report non disponibile."}</div>
            <p style={{ margin:"10px 0 0", fontSize:"11px", color:"#9ca3af" }}>La sezione ⚠️ DATI NON TROVATI indica dove fare ricerca manuale prima della call.</p>
          </div>}
        </div>

        <div style={{ textAlign:"center", marginTop:"16px" }}>
          <button onClick={()=>{setResult(null);setInput("");setNote("");setError("");}} style={{ background:"transparent", border:"1px solid #ddd", padding:"8px 18px", borderRadius:"8px", cursor:"pointer", fontSize:"13px", color:"#777", fontFamily:"inherit" }}>← Analizza un altro prospect</button>
        </div>
      </>}

      {/* Empty state */}
      {!loading && !result && !error && <div style={{ textAlign:"center", padding:"52px 24px", color:"#9ca3af" }}>
        <div style={{ fontSize:"44px", marginBottom:"14px" }}>🎯</div>
        <p style={{ margin:"0 0 6px", fontSize:"15px", color:"#6b7280", fontWeight:"700" }}>Inserisci un prospect per iniziare</p>
        <p style={{ margin:"0 0 4px", fontSize:"13px" }}>Sito web · Cerved/bilanci · news · LinkedIn · job posting</p>
        <p style={{ margin:"0 0 20px", fontSize:"12px", color:"#9ca3af" }}>~3-4 minuti · 3 case study · Design Sprint verticale · salvataggio automatico</p>
        <div style={{ display:"flex", gap:"8px", justifyContent:"center", flexWrap:"wrap", marginBottom:"24px" }}>
          {EXAMPLES.map(s=><button key={s} onClick={()=>setInput(s)} style={{ background:"#f3f4f6", border:"1px solid #e5e7eb", padding:"6px 14px", borderRadius:"20px", cursor:"pointer", fontSize:"12px", color:"#555", fontFamily:"inherit" }}>{s}</button>)}
        </div>
        <div style={{ display:"flex", gap:"12px", justifyContent:"center" }}>
          <div style={{ background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:"10px", padding:"12px 16px", fontSize:"12px", color:"#c2410c", maxWidth:"180px", textAlign:"left" }}>
            <div style={{ fontWeight:"700", marginBottom:"4px" }}>⚡ Design Sprint!</div>
            <div style={{ lineHeight:"1.5" }}>6 varianti verticali — scegli quella giusta</div>
          </div>
          <div style={{ background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:"10px", padding:"12px 16px", fontSize:"12px", color:"#15803d", maxWidth:"180px", textAlign:"left" }}>
            <div style={{ fontWeight:"700", marginBottom:"4px" }}>✨ Preventivo Emozionale</div>
            <div style={{ lineHeight:"1.5" }}>70% redemption · Dal prezzo al valore</div>
          </div>
          <div style={{ background:"#f0f8ff", border:"1px solid #bfdbfe", borderRadius:"10px", padding:"12px 16px", fontSize:"12px", color:"#1d4ed8", maxWidth:"180px", textAlign:"left" }}>
            <div style={{ fontWeight:"700", marginBottom:"4px" }}>📁 Archivio</div>
            <div style={{ lineHeight:"1.5" }}>Salva e consulta le analisi precedenti</div>
          </div>
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
